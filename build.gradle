plugins {
	id 'net.fabricmc.fabric-loom-remap' version "${loom_version}"
	id 'maven-publish'
}


version = project.mod_version
group = project.maven_group

base {
	archivesName = project.archives_base_name
}

repositories {

}

loom {
}

//fabricApi {
//	configureDataGeneration()
//}

dependencies {
	minecraft "com.mojang:minecraft:${project.minecraft_version}"
	mappings loom.officialMojangMappings()
	//mappings "net.fabricmc:yarn:1.21.11+build.1:v2"
	modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"
	modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"
	modImplementation "net.fabricmc:fabric-language-kotlin:1.13.8+kotlin.2.3.0"

	// PolyUI libraries from Maven
	//modImplementation "org.polyfrost:polyui-fabric:2.1.6"
	//include "org.polyfrost:polyui-fabric:2.1.6"

//	implementation "org.lwjgl:lwjgl-nanovg:3.3.3"
//	include "org.lwjgl:lwjgl-nanovg:3.3.3"

//	["windows", "linux", "macos", "macos-arm64"].each { os ->
//		implementation "org.lwjgl:lwjgl-nanovg:3.3.3:natives-$os"
//		include "org.lwjgl:lwjgl-nanovg:3.3.3:natives-$os"
//	}

//	modImplementation "cc.polyfrost:polyui:1.0.1"
//	include "cc.polyfrost:polyui:1.0.1"
//	implementation("org.polyfrost:polyui-jvm:2.1.6")
	
	modImplementation fileTree(dir: 'libs', include: ['*.jar'])

}

processResources {
	inputs.property "version", project.version

	filesMatching("fabric.mod.json") {
		expand "version": project.version
	}
}

tasks.withType(JavaCompile).configureEach {
	it.options.release = 21
	it.options.encoding = "UTF-8"
}

java {
	withSourcesJar()
	sourceCompatibility = JavaVersion.VERSION_21
	targetCompatibility = JavaVersion.VERSION_21
}

jar {
	inputs.property "archivesName", project.base.archivesName
	from("LICENSE") {
		rename { "${it}_${inputs.properties.archivesName}"}
	}
}

publishing {
	publications {
		create("mavenJava", MavenPublication) {
			artifactId = project.archives_base_name
			from components.java
		}
	}
	repositories {

	}
}