plugins {
	id 'net.fabricmc.fabric-loom-remap' version "${loom_version}"
	id 'maven-publish'
}

version = project.mod_version
group = project.maven_group

base {
	archivesName = project.archives_base_name
}

repositories {

}

loom {
	mods {
		"lucent" {
			sourceSet sourceSets.main
		}
	}
}

dependencies {
	minecraft "com.mojang:minecraft:${project.minecraft_version}"
	mappings loom.officialMojangMappings()
	modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"
	modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"

	def lwjglVersion = project.property("minecraft_lwjgl_version")
	modImplementation "org.lwjgl:lwjgl-nanovg:${lwjglVersion}"
	include "org.lwjgl:lwjgl-nanovg:${lwjglVersion}"
	["windows", "linux", "macos", "macos-arm64"].each { os ->
		modImplementation "org.lwjgl:lwjgl-nanovg:${lwjglVersion}:natives-${os}"
		include "org.lwjgl:lwjgl-nanovg:${lwjglVersion}:natives-${os}"
	}
}

processResources {
	inputs.property "version", project.version

	filesMatching("fabric.mod.json") {
		expand "version": project.version
	}
}

tasks.withType(JavaCompile).configureEach {
	it.options.release = 21
	it.options.encoding = "UTF-8"
}

java {
	withSourcesJar()
	sourceCompatibility = JavaVersion.VERSION_21
	targetCompatibility = JavaVersion.VERSION_21
}

jar {
	inputs.property "archivesName", project.base.archivesName
	from("LICENSE") {
		rename { "${it}_${inputs.properties.archivesName}"}
	}
}

// JIJ Library Version (remove nanovg)
task remapLibraryJar(type: net.fabricmc.loom.task.RemapJarTask) {
	dependsOn jar
	input = jar.archiveFile
	archiveClassifier = 'library'
	addNestedDependencies = false 
}

assemble.dependsOn remapLibraryJar

publishing {
	publications {
		create("mavenJava", MavenPublication) {
			artifactId = project.archives_base_name
			from components.java
			
			// JIJ Library Version
			artifact(remapLibraryJar) {
				classifier = "library"
			}
		}
	}
	repositories {

	}
}